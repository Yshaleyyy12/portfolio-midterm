<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 2: Flexbox Layout</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 15px;
            background-color: #f4f4f4;
        }

        /* 1. Nilagyan ng Border, Padding, at Margin ang bawat section base sa requirements */
        header, aside, main, footer {
            padding: 25px;
            margin: 8px;
            border: 3px solid #333333;
            text-align: center;
            font-weight: bold;
            color: white;
            border-radius: 4px;
        }

        /* 4. Gumamit ng magkakaibang background colors sa bawat section */
        header {
            background-color: #2c3e50; /* Dark Blue/Gray */
        }

        /* 2. Ginamit ang Flexbox para sa Gitnang Content Area (Sidebar + Content) */
        .content-area {
            display: flex;
            flex-direction: row;
        }

        aside {
            background-color: #2980b9; /* Blue */
            flex: 1; /* Mas makitid para sa Sidebar */
        }

        main {
            background-color: #27ae60; /* Green */
            flex: 3; /* Mas malawak para sa Main Content area */
        }

        footer {
            background-color: #7f8c8d; /* Gray */
        }

        /* Responsive design para sa mobile (magiging patong-patong kapag maliit ang screen) */
        @media (max-width: 600px) {
            .content-area {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        Header
    </header>

    <div class="content-area">
        <aside>
            Sidebar
        </aside>
        
        <main>
            Content
        </main>
    </div>

    <footer>
        Footer
    </footer>

</body>
</html>
